stages:
  preprocess:
    cmd: uv run python scripts/build_movielens_interactions.py
    deps:
      - data/raw/ml-100k/u.data
      - scripts/build_movielens_interactions.py
      - src/utils/config.py
    params:
      - params.yaml:
          - seed
    outs:
      - data/processed/interactions.parquet

  feature_engineering:
    cmd: uv run python -m preprocessing.feature_cli
    deps:
      - data/processed/interactions.parquet
      - src/preprocessing/feature_engineering.py
      - src/preprocessing/feature_cli.py
    params:
      - params.yaml:
          - seed
    outs:
      - data/features/train.parquet
      - data/features/val.parquet
      - data/features/test.parquet
      - data/features/encoders.json

  train:
    cmd: uv run python -m training.cli
    deps:
      - data/features/train.parquet
      - data/features/val.parquet
      - data/features/encoders.json
      - src/models/mlp.py
      - src/models/factory.py
      - src/training/trainer.py
      - src/training/cli.py
      - src/training/dataset.py
      - src/training/tracker.py
    params:
      - params.yaml:
          - training
          - seed
    outs:
      - models/model.pt
    metrics:
      - models/train_metrics.json:
          cache: false

  evaluate:
    cmd: uv run python -m evaluation.cli
    deps:
      - data/features/test.parquet
      - data/features/encoders.json
      - models/model.pt
      - src/evaluation/evaluator.py
      - src/evaluation/metrics.py
      - src/evaluation/cli.py
    params:
      - params.yaml:
          - evaluation
          - seed
    metrics:
      - models/eval_metrics.json:
          cache: false

  compare_models:
    cmd: uv run python scripts/compare_models.py
    deps:
      - data/features/train.parquet
      - data/features/test.parquet
      - data/features/encoders.json
      - models/model.pt
      - scripts/compare_models.py
      - src/evaluation/evaluator.py
      - src/evaluation/metrics.py
      - src/models/baseline.py
      - src/models/factory.py
      - src/models/mlp.py
      - src/training/dataset.py
      - src/training/tracker.py
    params:
      - params.yaml:
          - evaluation
          - training
          - seed
    metrics:
      - models/model_comparison.json:
          cache: false

  register:
    cmd: uv run python scripts/register_model.py
    deps:
      - models/model.pt
      - data/features/encoders.json
      - scripts/register_model.py
      - src/training/tracker.py
    params:
      - params.yaml:
          - seed
