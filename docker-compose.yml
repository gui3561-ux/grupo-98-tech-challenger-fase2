services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: mlflow-server
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-trainer
    command: >
      sh -c "
        python scripts/build_movielens_interactions.py &&
        python -m preprocessing.feature_cli &&
        python -m training.cli &&
        python scripts/compare_models.py &&
        python scripts/register_model.py
      "
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ecommerce-recommender
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy
    profiles:
      - training

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ecommerce-recommender
    volumes:
      - ./models:/app/models:ro
      - ./data/features:/app/data/features:ro
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  mlflow-data:
